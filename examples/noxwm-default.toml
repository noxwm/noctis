# noctis — noxwm default theme (AB6C6A rose)
# Copy to ~/.config/noctis/config.toml

[general]
terminal     = "kitty"
gap          = 6
master_ratio = 0.55
border_width = 2

[colors]
background      = "#1a1a26"
active_border   = "#AB6C6A"
inactive_border = "#333333"

[autostart]
apps = []
# apps = ["waybar", "dunst", "swww-daemon"]

[keybinds]
"Super+Return"  = "exec:kitty"
"Super+Q"       = "close"
"Super+J"       = "focus_next"
"Super+K"       = "focus_prev"
"Super+Shift+Q" = "exit"
# "Super+B"       = "exec:firefox"
# "Super+Shift+F" = "exec:thunar"
# "Super+L"       = "exec:swaylock"
