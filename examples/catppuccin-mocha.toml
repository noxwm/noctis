# noctis — Catppuccin Mocha theme
# Copy to ~/.config/noctis/config.toml

[general]
terminal     = "kitty"
gap          = 8
master_ratio = 0.55
border_width = 2

[colors]
background      = "#1E1E2E"
active_border   = "#CBA6F7"
inactive_border = "#313244"

[autostart]
apps = []

[keybinds]
"Super+Return"  = "exec:kitty"
"Super+Q"       = "close"
"Super+J"       = "focus_next"
"Super+K"       = "focus_prev"
"Super+Shift+Q" = "exit"
