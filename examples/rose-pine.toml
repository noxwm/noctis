# noctis — Rosé Pine theme
# Copy to ~/.config/noctis/config.toml

[general]
terminal     = "kitty"
gap          = 8
master_ratio = 0.55
border_width = 2

[colors]
background      = "#191724"
active_border   = "#C4A7E7"
inactive_border = "#26233A"

[autostart]
apps = []

[keybinds]
"Super+Return"  = "exec:kitty"
"Super+Q"       = "close"
"Super+J"       = "focus_next"
"Super+K"       = "focus_prev"
"Super+Shift+Q" = "exit"
